<!doctype html>
<html lang="fr">
<head>
<title>Images aléatoires</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    background-color: #AAAAAA;
    height: 100vh;
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  .btn {
    font-size: 28px;
    padding: 16px 28px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    color: white;
    font-weight: bold;
    margin: 5px;
    transition: 0.2s;
    box-shadow: 0 0 12px rgba(255,255,255,0.4);
  }

  .btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 18px rgba(255,255,255,0.7);
  }

  #btn-normal {
    background: linear-gradient(45deg, #ff4d4d, #ff9900);
  }

  #btn-folie {
    background: linear-gradient(45deg, #6a00ff, #ff00c8);
  }

  #btn-gravite {
    background: linear-gradient(45deg, #00c3ff, #00ff88);
  }

  #top-bar {
    text-align:center;
    margin-top:20px;
  }

  #compteur {
    font-size: 26px;
    margin-top: 10px;
    font-weight: bold;
  }

  .img-random {
    position: absolute;
    transition: transform 0.3s, top 1s linear;
  }

  .img-random:hover {
    transform: rotate(10deg) scale(1.1);
  }
</style>

</head>
<body>

<div id="top-bar">
  <button id="btn-normal" class="btn" onclick="ajouterImage()">CLIQUE</button>
  <button id="btn-folie" class="btn" onclick="modeFolie()">FOLIE</button>
  <button id="btn-gravite" class="btn" onclick="modeGravite()">GRAVITÉ</button>
  <div id="compteur">Clics : 0</div>
</div>

<script>
let clics = 0;
let folieActive = false;
let intervalFolie = null;
let graviteActive = false;

const sons = [
  "https://www.myinstants.com/media/sounds/bonk-sound-effect.mp3",
  "https://www.myinstants.com/media/sounds/windows-xp-error.mp3", 
  "https://www.myinstants.com/media/sounds/cartoon-slip.mp3",
  "https://www.myinstants.com/media/sounds/quack_2.mp3",
  "https://www.myinstants.com/media/sounds/thud.mp3"
];

const images = [
  "https://tse3.mm.bing.net/th/id/OIP.M-zQRPiEjhNVvpOd1IJPNQHaEK?pid=ImgDet&rs=1",
  "https://tse2.mm.bing.net/th/id/OIP.RD2uM5G7XZBx2ZqTGrxOAAHaEK?pid=ImgDet&rs=1",
  "https://tse2.mm.bing.net/th/id/OIP.5xVv9FU1ZMXUjO8RCY2YMAHaHZ?pid=ImgDet&rs=1",
  "https://tse2.mm.bing.net/th/id/OIP.KUkB9qKHd0UFhLqAYfyXhAHaEK?pid=ImgDet&rs=1",
  "https://tse2.mm.bing.net/th/id/OIP.9lq3p1v8l7v3X3p0pQHaEK?pid=ImgDet&rs=1"
];

function ajouterImage() {
  clics++;
  document.getElementById("compteur").textContent = "Clics : " + clics;

  const son = sons[Math.floor(Math.random() * sons.length)];
  new Audio(son).play();

  const img = document.createElement("img");
  img.src = images[Math.floor(Math.random() * images.length)];
  img.className = "img-random";

  const imgWidth = 120 + Math.random() * 220;
  img.style.width = imgWidth + "px";

  document.body.appendChild(img);

  const topSafeZone = 140; // zone protégée pour les boutons
  let x = Math.random() * (window.innerWidth - imgWidth);
  let y = topSafeZone + Math.random() * (window.innerHeight - topSafeZone - imgWidth);

  img.style.left = x + "px";
  img.style.top = y + "px";

  if (graviteActive) {
    tomberAuSol(img, imgWidth);
  }
}

function tomberAuSol(img, imgWidth) {
  const bottom = window.innerHeight - imgWidth;
  // on garde la position X, on anime juste le top vers le bas
  requestAnimationFrame(() => {
    img.style.top = bottom + "px";
  });
}

function modeFolie() {
  if (!folieActive) {
    folieActive = true;
    intervalFolie = setInterval(() => {
      for (let i = 0; i < 5; i++) {
        ajouterImage();
      }
    }, 100);
    document.getElementById("btn-folie").textContent = "STOP";
  } else {
    folieActive = false;
    clearInterval(intervalFolie);
    document.getElementById("btn-folie").textContent = "FOLIE";
  }
}

function modeGravite() {
  graviteActive = !graviteActive;

  if (graviteActive) {
    document.getElementById("btn-gravite").textContent = "GRAVITÉ ON";
    document.querySelectorAll(".img-random").forEach(img => {
      const imgWidth = img.getBoundingClientRect().width;
      tomberAuSol(img, imgWidth);
    });
  } else {
    document.getElementById("btn-gravite").textContent = "GRAVITÉ";
    // on ne remonte pas les images : elles restent au sol
  }
}
</script>

</body>
</html>
